name: build-ios-opencv-python

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios-opencv-python.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build iOS wheel cp314
    runs-on: macos-14

    env:
      CIBW_PLATFORM: ios
      CIBW_BUILD: cp314-ios_arm64_iphoneos
      CIBW_ARCHS: arm64_iphoneos
      CIBW_BUILD_VERBOSITY: "2"
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade "cibuildwheel>=2.20.0"

      - name: Clone fixed upstream commit
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf builder
          git clone https://github.com/Py-Swift/opencv-python-old.git builder
          cd builder
          git checkout 0745eb8f88032c65530734db2ef382afa4533a00
          git submodule update --init --recursive

      - name: Patch pyproject build deps for cp314 iOS
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path("builder/pyproject.toml")
          s = p.read_text(encoding="utf-8")
          out = []
          for line in s.splitlines():
            t = line.strip()
            if t.startswith('"numpy<') or t.startswith('"numpy=='):
              continue
            out.append(line)
          p.write_text("\n".join(out) + "\n", encoding="utf-8")
          print("patched", p)
          PY

      - name: Prepare NumPy headers for OpenCV Python wrapper
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf builder-numpy
          git clone --depth=1 --branch v2.4.4 https://github.com/numpy/numpy.git builder-numpy
          NUMPY_INCLUDE_DIR="${PWD}/builder-numpy/numpy/_core/include"
          if [ ! -d "${NUMPY_INCLUDE_DIR}" ]; then
            NUMPY_INCLUDE_DIR="${PWD}/builder-numpy/numpy/core/include"
          fi
          test -d "${NUMPY_INCLUDE_DIR}"
          echo "CMAKE_ARGS=-DPYTHON3_NUMPY_INCLUDE_DIRS=${NUMPY_INCLUDE_DIR}" >> "${GITHUB_ENV}"

      - name: Patch setup.py config path for iOS packaging
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path("builder/setup.py")
          s = p.read_text(encoding="utf-8")
          needle = "with open(config_py, 'w') as opencv_init_config:"
          if needle in s and "os.makedirs(os.path.dirname(config_py), exist_ok=True)" not in s:
            s = s.replace(
              needle,
              "os.makedirs(os.path.dirname(config_py), exist_ok=True)\n        " + needle,
              1,
            )
          if "opencv_init_path = os.path.join(cmake_install_dir, 'python', 'cv2', '__init__.py')" not in s:
            s = s.replace(
              "opencv_init_config.write(custom_init_data)",
              "opencv_init_config.write(custom_init_data)\n\n        opencv_init_path = os.path.join(cmake_install_dir, 'python', 'cv2', '__init__.py')\n        os.makedirs(os.path.dirname(opencv_init_path), exist_ok=True)\n        with open(opencv_init_path, 'w') as opencv_init_py:\n            opencv_init_py.write(custom_init_data)",
              1,
            )
          if 'if not found and "gapi" not in relpath_re:' in s:
            s = s.replace(
              'if not found and "gapi" not in relpath_re:',
              'if not found and "gapi" not in relpath_re and not ("ios" in sysconfig.get_platform() and relpath_re.startswith("python/cv2/")):',
              1,
            )
          p.write_text(s, encoding="utf-8")
          print("patched", p)
          PY

      - name: Build iOS wheel via cibuildwheel
        shell: bash
        run: |
          set -euxo pipefail
          cd builder
          python -m cibuildwheel --platform ios --output-dir wheelhouse
          ls -lah wheelhouse

      - name: Validate wheel contains cv2 binary
        shell: bash
        run: |
          set -euxo pipefail
          WHEEL_FILE="$(ls -1 builder/wheelhouse/*.whl | head -n 1)"
          python - <<'PY' "${WHEEL_FILE}"
          import sys
          import zipfile

          wheel = sys.argv[1]
          with zipfile.ZipFile(wheel) as zf:
            names = zf.namelist()

          bins = [n for n in names if n.endswith(".so") or n.endswith(".dylib")]
          print("wheel:", wheel)
          print("binary_count:", len(bins))
          if bins:
            for b in bins[:20]:
              print(" ", b)
          if not bins:
            raise SystemExit("wheel has no compiled cv2 binary")
          PY

      - name: Collect artifacts
        shell: bash
        run: |
          set -euxo pipefail
          cp builder/wheelhouse/*.whl opencv-python-ios-cp314-arm64-iphoneos.whl
          mkdir -p artifacts
          cp -R builder/wheelhouse artifacts/
          tar -czf opencv-python-ios-cp314-arm64-iphoneos.tar.gz -C artifacts wheelhouse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-ios-cp314-arm64-iphoneos
          path: |
            opencv-python-ios-cp314-arm64-iphoneos.whl
            opencv-python-ios-cp314-arm64-iphoneos.tar.gz
            artifacts/wheelhouse/*.whl
          if-no-files-found: error
