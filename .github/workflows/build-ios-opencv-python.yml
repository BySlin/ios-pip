name: build-ios-opencv-python

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios-opencv-python.yml"

permissions:
  contents: read

jobs:
  build:
    name: iOS ${{ matrix.sdk }} / Python 3.14
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        sdk: [iphoneos]

    env:
      OPENCV_VERSION: "4.13.0"
      NUMPY_VERSION: "2.4.4"
      IOS_DEPLOYMENT_TARGET: "13.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          brew update
          brew install cmake ninja pkg-config
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade "ninja>=1.11.1" "Cython>=3.0.11"

      - name: Fetch NumPy/OpenCV sources
        run: |
          # NumPy 2.x 需要 vendored-meson（通过 submodule 提供）
          git clone --depth=1 --branch "v${NUMPY_VERSION}" --recurse-submodules --shallow-submodules https://github.com/numpy/numpy.git
          git clone --depth=1 --branch "${OPENCV_VERSION}" https://github.com/opencv/opencv.git
          git clone --depth=1 --branch "${OPENCV_VERSION}" https://github.com/opencv/opencv_contrib.git

      - name: Build iOS NumPy first
        shell: bash
        run: |
          set -euxo pipefail

          SDK="${{ matrix.sdk }}"
          IOS_ARCH=arm64
          SYSROOT="$(xcrun --sdk "${SDK}" --show-sdk-path)"
          CC="$(xcrun --sdk "${SDK}" --find clang)"
          CXX="$(xcrun --sdk "${SDK}" --find clang++)"
          AR="$(xcrun --sdk "${SDK}" --find ar)"
          RANLIB="$(xcrun --sdk "${SDK}" --find ranlib)"
          STRIP="$(xcrun --sdk "${SDK}" --find strip)"

          if [ "${SDK}" = "iphonesimulator" ]; then
            TARGET_TRIPLE="arm64-apple-ios${IOS_DEPLOYMENT_TARGET}-simulator"
          else
            TARGET_TRIPLE="arm64-apple-ios${IOS_DEPLOYMENT_TARGET}"
          fi

          # NumPy(2.x) 使用 Meson 构建；这里通过 cross file 交叉编译 iOS 产物
          cat > numpy-ios.cross <<EOF
          [binaries]
          c = '${CC}'
          cpp = '${CXX}'
          ar = '${AR}'
          ranlib = '${RANLIB}'
          strip = '${STRIP}'
          pkgconfig = 'pkg-config'

          [host_machine]
          system = 'darwin'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'

          [properties]
          needs_exe_wrapper = true
          # 交叉编译 iOS 时无法运行目标程序，显式提供 long double 格式
          longdouble_format = 'IEEE_DOUBLE_LE'

          [built-in options]
          c_args = ['-arch', '${IOS_ARCH}', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          cpp_args = ['-arch', '${IOS_ARCH}', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          c_link_args = ['-arch', '${IOS_ARCH}', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          cpp_link_args = ['-arch', '${IOS_ARCH}', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          EOF

          # 强制使用 NumPy 自带 vendored Meson（官方要求，含 features 模块）
          MESON_CMD=(python "numpy/vendored-meson/meson/meson.py")
          test -f "numpy/vendored-meson/meson/meson.py"
          "${MESON_CMD[@]}" --version

          "${MESON_CMD[@]}" setup numpy-build-${{ matrix.sdk }} numpy \
            --cross-file "${PWD}/numpy-ios.cross" \
            --prefix "${PWD}/numpy-install/${{ matrix.sdk }}" \
            -Dbuildtype=release \
            -Dallow-noblas=true

          "${MESON_CMD[@]}" compile -C numpy-build-${{ matrix.sdk }}
          "${MESON_CMD[@]}" install -C numpy-build-${{ matrix.sdk }}

          NUMPY_INCLUDE_DIR="$(find "numpy-install/${{ matrix.sdk }}" -type d -path '*/site-packages/numpy/_core/include' -print -quit || true)"
          if [ -z "${NUMPY_INCLUDE_DIR}" ]; then
            NUMPY_INCLUDE_DIR="$(find "numpy-install/${{ matrix.sdk }}" -type d -path '*/site-packages/numpy/core/include' -print -quit || true)"
          fi
          if [ -z "${NUMPY_INCLUDE_DIR}" ]; then
            echo "NumPy include directory not found" >&2
            exit 1
          fi

          NUMPY_SITE_PACKAGES_DIR="$(find "numpy-install/${{ matrix.sdk }}" -type d -path '*/site-packages' -print -quit || true)"
          if [ -z "${NUMPY_SITE_PACKAGES_DIR}" ]; then
            echo "NumPy site-packages directory not found" >&2
            exit 1
          fi

          echo "NUMPY_INCLUDE_DIR=${NUMPY_INCLUDE_DIR}" >> "${GITHUB_ENV}"
          echo "NUMPY_SITE_PACKAGES_DIR=${NUMPY_SITE_PACKAGES_DIR}" >> "${GITHUB_ENV}"

      - name: Configure and build OpenCV Python binding for iOS
        shell: bash
        run: |
          set -euxo pipefail

          # iOS 模拟器和真机都使用 arm64，便于后续统一打包
          IOS_ARCH=arm64

          # Python 3.14 主机解释器用于生成绑定代码；目标产物为 iOS 平台可加载模块
          PYTHON_BIN="$(python -c 'import sys; print(sys.executable)')"
          PYTHON_INCLUDE_DIR="$(python -c 'import sysconfig; print(sysconfig.get_paths()["include"])')"
          PYTHON_LIB="$(python - <<'PY'
          import os
          import sysconfig
          libdir = sysconfig.get_config_var("LIBDIR") or ""
          ldlib = sysconfig.get_config_var("LDLIBRARY") or ""
          print(os.path.join(libdir, ldlib) if libdir and ldlib else "")
          PY
          )"
          CMAKE_ARGS=(
            -DOPENCV_EXTRA_MODULES_PATH="${PWD}/opencv_contrib/modules"
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_INSTALL_PREFIX="${PWD}/install/${{ matrix.sdk }}"
            -DCMAKE_SYSTEM_NAME=iOS
            -DAPPLE_FRAMEWORK=OFF
            -DCMAKE_OSX_SYSROOT="${{ matrix.sdk }}"
            -DCMAKE_OSX_ARCHITECTURES="${IOS_ARCH}"
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${IOS_DEPLOYMENT_TARGET}"
            -DCMAKE_SHARED_LINKER_FLAGS="-framework Foundation -framework CoreFoundation -framework CoreGraphics -framework QuartzCore -framework UIKit"
            -DCMAKE_MODULE_LINKER_FLAGS="-framework Foundation -framework CoreFoundation -framework CoreGraphics -framework QuartzCore -framework UIKit"
            -DBUILD_SHARED_LIBS=ON
            -DBUILD_TESTS=OFF
            -DBUILD_PERF_TESTS=OFF
            -DBUILD_EXAMPLES=OFF
            -DBUILD_opencv_apps=OFF
            -DBUILD_opencv_dnn=OFF
            -DBUILD_opencv_java=OFF
            -DBUILD_opencv_js=OFF
            -DBUILD_opencv_python2=OFF
            -DBUILD_opencv_python3=ON
            -DOPENCV_PYTHON3_INSTALL_PATH="${PWD}/install/${{ matrix.sdk }}/python"
            -DPython3_EXECUTABLE="${PYTHON_BIN}"
            -DPython3_INCLUDE_DIR="${PYTHON_INCLUDE_DIR}"
            -DPYTHON3_EXECUTABLE="${PYTHON_BIN}"
            -DPYTHON3_INCLUDE_PATH="${PYTHON_INCLUDE_DIR}"
            -DPYTHON3_INCLUDE_DIR="${PYTHON_INCLUDE_DIR}"
            -DPYTHON3_NUMPY_INCLUDE_DIRS="${NUMPY_INCLUDE_DIR}"
            -DPYTHON3_PACKAGES_PATH="${PWD}/install/${{ matrix.sdk }}/python"
          )

          # 某些 Python 3.14 分发版不暴露可链接的 libpython，存在时再传入
          if [ -n "${PYTHON_LIB}" ] && [ -f "${PYTHON_LIB}" ]; then
            CMAKE_ARGS+=(-DPYTHON3_LIBRARY="${PYTHON_LIB}")
          fi

          cmake -S opencv -B build-${{ matrix.sdk }} -G Ninja "${CMAKE_ARGS[@]}"

          cmake --build build-${{ matrix.sdk }} --config Release -j"$(sysctl -n hw.logicalcpu)"
          cmake --install build-${{ matrix.sdk }} --config Release

          # 必须确认真正生成了 cv2 扩展，避免产出空 wheel
          CV2_EXT_COUNT="$(find "install/${{ matrix.sdk }}" -type f \( -name 'cv2*.so' -o -name 'cv2*.dylib' \) | wc -l | tr -d ' ')"
          if [ "${CV2_EXT_COUNT}" = "0" ]; then
            echo "ERROR: cv2 extension not found. OpenCV Python binding was not generated." >&2
            exit 1
          fi

      - name: Pack artifacts
        shell: bash
        run: |
          set -euxo pipefail
          OUT_DIR="artifacts/${{ matrix.sdk }}"
          mkdir -p "${OUT_DIR}"

          # 收集 iOS NumPy 构建产物
          if [ -d "numpy-install/${{ matrix.sdk }}" ]; then
            cp -R "numpy-install/${{ matrix.sdk }}" "${OUT_DIR}/numpy"
          fi

          # 收集 Python cv2 扩展和 OpenCV 依赖库
          if [ -d "install/${{ matrix.sdk }}/lib/python3" ]; then
            cp -R "install/${{ matrix.sdk }}/lib/python3" "${OUT_DIR}/"
          fi
          if [ -d "install/${{ matrix.sdk }}/lib" ]; then
            cp -R "install/${{ matrix.sdk }}/lib" "${OUT_DIR}/lib"
          fi
          if [ -d "install/${{ matrix.sdk }}/include" ]; then
            cp -R "install/${{ matrix.sdk }}/include" "${OUT_DIR}/include"
          fi

          # 额外打一个可分发的 wheel（iOS 平台 tag）
          WHEEL_ROOT="${PWD}/wheel-build"
          PKG_ROOT="${WHEEL_ROOT}/opencv_python_ios"
          rm -rf "${WHEEL_ROOT}"
          mkdir -p "${PKG_ROOT}/cv2/.dylibs"

          CV2_SRC_DIR="$(find "install/${{ matrix.sdk }}" -type d -path '*/cv2' -print -quit || true)"
          if [ -n "${CV2_SRC_DIR}" ] && [ -d "${CV2_SRC_DIR}" ]; then
            cp -R "${CV2_SRC_DIR}/." "${PKG_ROOT}/cv2/"
          fi

          # 某些布局下 cv2 是单个扩展文件，兜底复制到包目录
          CV2_EXT="$(find "install/${{ matrix.sdk }}" -type f \( -name 'cv2*.so' -o -name 'cv2*.dylib' \) -print -quit || true)"
          if [ -n "${CV2_EXT}" ]; then
            cp "${CV2_EXT}" "${PKG_ROOT}/cv2/"
          fi

          if [ -z "${CV2_EXT}" ] && [ -z "${CV2_SRC_DIR}" ]; then
            echo "ERROR: no cv2 files found for wheel packaging." >&2
            exit 1
          fi

          if [ ! -f "${PKG_ROOT}/cv2/__init__.py" ]; then
            cat > "${PKG_ROOT}/cv2/__init__.py" <<'PY'
          import importlib
          import pathlib
          import sys

          _pkg_dir = pathlib.Path(__file__).resolve().parent
          _dylib_dir = _pkg_dir / ".dylibs"
          if _dylib_dir.exists():
            sys.path.insert(0, str(_dylib_dir))

          # 兼容 cv2 单文件扩展安装布局
          try:
            from .cv2 import *  # type: ignore
          except Exception:
            _ext = next(_pkg_dir.glob("cv2*.so"), None) or next(_pkg_dir.glob("cv2*.dylib"), None)
            if _ext is None:
              raise
            import importlib.util
            spec = importlib.util.spec_from_file_location("cv2.cv2", _ext)
            mod = importlib.util.module_from_spec(spec)
            assert spec and spec.loader
            spec.loader.exec_module(mod)
            globals().update({k: getattr(mod, k) for k in dir(mod) if not k.startswith("_")})
          PY
          fi

          # 附带 OpenCV dylib 依赖
          find "install/${{ matrix.sdk }}/lib" -maxdepth 1 -type f -name "libopencv*.dylib" -exec cp {} "${PKG_ROOT}/cv2/.dylibs/" \;

          cat > "${PKG_ROOT}/setup.py" <<'PY'
          from setuptools import setup, find_packages

          setup(
              name="opencv-python-ios",
              version="4.13.0.0",
              description="OpenCV Python bindings for iOS",
              packages=find_packages(),
              include_package_data=True,
              package_data={"cv2": ["*.so", "*.dylib", ".dylibs/*.dylib"]},
              zip_safe=False,
          )
          PY

          cat > "${PKG_ROOT}/pyproject.toml" <<'TOML'
          [build-system]
          requires = ["setuptools>=68", "wheel"]
          build-backend = "setuptools.build_meta"
          TOML

          (
            cd "${PKG_ROOT}"
            python setup.py bdist_wheel --python-tag cp314 --plat-name ios_13_0_arm64
          )

          WHEEL_FILE="$(ls -1 "${PKG_ROOT}"/dist/*.whl | head -n 1)"
          cp "${WHEEL_FILE}" "${OUT_DIR}/"
          cp "${WHEEL_FILE}" "opencv-python-ios-${{ matrix.sdk }}-py314.whl"
          tar -czf "opencv-python-ios-${{ matrix.sdk }}-py314.tar.gz" -C artifacts "${{ matrix.sdk }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-ios-${{ matrix.sdk }}-py314
          path: |
            opencv-python-ios-${{ matrix.sdk }}-py314.tar.gz
            opencv-python-ios-${{ matrix.sdk }}-py314.whl
            artifacts/${{ matrix.sdk }}/*.whl
          if-no-files-found: error
