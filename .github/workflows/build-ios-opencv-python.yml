name: build-ios-opencv-python

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios-opencv-python.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build iOS wheel cp314
    runs-on: macos-14

    env:
      IOS_DEPLOYMENT_TARGET: "13.0"
      CIBW_PLATFORM: "ios"
      CIBW_BUILD: "cp314-ios_arm64_iphoneos"
      CIBW_SKIP: "*-win* *-manylinux* *-musllinux* *-macosx*"
      CIBW_ARCHS: "arm64_iphoneos"
      CIBW_BUILD_VERBOSITY: "2"
      OPENCV_PYTHON_PACKAGE_NAME: "opencv-python"
      ENABLE_CONTRIB: "0"
      ENABLE_HEADLESS: "1"
      ENABLE_ROLLING: "0"
      CI_BUILD: "1"
      OPENCV_PYTHON_SKIP_GIT_COMMANDS: "1"
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade "cibuildwheel>=2.20.0" build

      - name: Clone reference builder (Py-Swift/opencv-python-old)
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf builder
          git clone --depth=1 --recurse-submodules --shallow-submodules https://github.com/Py-Swift/opencv-python-old.git builder

      - name: Patch builder to skip numpy build dependency on iOS cp314
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path("builder/pyproject.toml")
          s = p.read_text(encoding="utf-8")
          out = []
          for line in s.splitlines():
            t = line.strip()
            if t.startswith('"numpy<') or t.startswith('"numpy=='):
              continue
            out.append(line)
          p.write_text("\n".join(out) + "\n", encoding="utf-8")
          print("patched", p)

          sp = Path("builder/setup.py")
          ss = sp.read_text(encoding="utf-8")
          needle = "with open(config_py, 'w') as opencv_init_config:"
          if needle in ss and "os.makedirs(os.path.dirname(config_py), exist_ok=True)" not in ss:
            ss = ss.replace(
              needle,
              "os.makedirs(os.path.dirname(config_py), exist_ok=True)\n        " + needle,
              1,
            )
          if "opencv_init_path = os.path.join(cmake_install_dir, 'python', 'cv2', '__init__.py')" not in ss:
            ss = ss.replace(
              "opencv_init_config.write(custom_init_data)",
              "opencv_init_config.write(custom_init_data)\n\n        opencv_init_path = os.path.join(cmake_install_dir, 'python', 'cv2', '__init__.py')\n        os.makedirs(os.path.dirname(opencv_init_path), exist_ok=True)\n        with open(opencv_init_path, 'w') as opencv_init_py:\n            opencv_init_py.write(custom_init_data)",
              1,
            )

          if "patched marker" not in ss:
            ss += "\n# patched marker\n"

          sp.write_text(ss, encoding="utf-8")
          print("patched", sp)

          sp = Path("builder/setup.py")
          ss = sp.read_text(encoding="utf-8")
          if 'if not found and "gapi" not in relpath_re:' in ss:
            ss = ss.replace(
              'if not found and "gapi" not in relpath_re:',
              'if not found and "gapi" not in relpath_re and not ("ios" in sysconfig.get_platform() and (relpath_re.startswith("python/cv2/python-") or relpath_re == "python/cv2/__init__.py")):',
              1,
            )
            sp.write_text(ss, encoding="utf-8")
            print("patched missing-path rule in", sp)
          PY

      - name: Build iOS wheel via cibuildwheel
        shell: bash
        run: |
          set -euxo pipefail
          cd builder
          python -m cibuildwheel --platform ios --output-dir wheelhouse
          ls -lah wheelhouse

      - name: Validate wheel has cv2 extension
        shell: bash
        run: |
          set -euxo pipefail
          WHEEL_FILE="$(ls -1 builder/wheelhouse/*.whl | head -n 1)"
          python - <<'PY' "${WHEEL_FILE}"
          import sys
          import zipfile

          wheel = sys.argv[1]
          with zipfile.ZipFile(wheel) as zf:
              names = zf.namelist()
              has_cv2 = any(
                  n.startswith("cv2/") and (n.endswith(".so") or n.endswith(".dylib"))
                  for n in names
              )
          print("wheel:", wheel)
          print("has_cv2_ext:", has_cv2)
          if not has_cv2:
              raise SystemExit(1)
          PY

      - name: Collect artifacts
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          cp -R builder/wheelhouse artifacts/
          cp builder/wheelhouse/*.whl opencv-python-ios-cp314-arm64-iphoneos.whl
          tar -czf opencv-python-ios-cp314-arm64-iphoneos.tar.gz -C artifacts wheelhouse

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-ios-cp314-arm64-iphoneos
          path: |
            opencv-python-ios-cp314-arm64-iphoneos.whl
            opencv-python-ios-cp314-arm64-iphoneos.tar.gz
            artifacts/wheelhouse/*.whl
          if-no-files-found: error
