name: build-ios-opencv-python

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios-opencv-python.yml"

permissions:
  contents: read

jobs:
  build:
    name: iOS iphoneos / Python 3.14
    runs-on: macos-14

    env:
      OPENCV_VERSION: "4.13.0"
      NUMPY_VERSION: "2.4.4"
      IOS_DEPLOYMENT_TARGET: "13.0"
      SDK: "iphoneos"
      IOS_ARCH: "arm64"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja pkg-config
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install --upgrade "meson>=1.7.0" "ninja>=1.11.1" "Cython>=3.0.0"

      - name: Fetch NumPy/OpenCV sources
        shell: bash
        run: |
          set -euxo pipefail
          git clone --depth=1 --branch "v${NUMPY_VERSION}" --recurse-submodules --shallow-submodules https://github.com/numpy/numpy.git
          git clone --depth=1 --branch "${OPENCV_VERSION}" https://github.com/opencv/opencv.git
          git clone --depth=1 --branch "${OPENCV_VERSION}" https://github.com/opencv/opencv_contrib.git

      - name: Build iOS NumPy first
        shell: bash
        run: |
          set -euxo pipefail

          SYSROOT="$(xcrun --sdk "${SDK}" --show-sdk-path)"
          CC="$(xcrun --sdk "${SDK}" --find clang)"
          CXX="$(xcrun --sdk "${SDK}" --find clang++)"
          AR="$(xcrun --sdk "${SDK}" --find ar)"
          RANLIB="$(xcrun --sdk "${SDK}" --find ranlib)"
          STRIP="$(xcrun --sdk "${SDK}" --find strip)"
          TARGET_TRIPLE="${IOS_ARCH}-apple-ios${IOS_DEPLOYMENT_TARGET}"

          cat > numpy-ios.cross <<EOF
          [binaries]
          c = '${CC}'
          cpp = '${CXX}'
          ar = '${AR}'
          ranlib = '${RANLIB}'
          strip = '${STRIP}'
          pkgconfig = 'pkg-config'

          [host_machine]
          system = 'darwin'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'

          [properties]
          needs_exe_wrapper = true
          longdouble_format = 'IEEE_DOUBLE_LE'

          [built-in options]
          c_args = ['-arch', '${IOS_ARCH}', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          cpp_args = ['-arch', '${IOS_ARCH}', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          c_link_args = ['-arch', '${IOS_ARCH}', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          cpp_link_args = ['-arch', '${IOS_ARCH}', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          EOF

          python numpy/vendored-meson/meson/meson.py setup numpy-build numpy \
            --cross-file "${PWD}/numpy-ios.cross" \
            --prefix "${PWD}/numpy-install/iphoneos" \
            -Dbuildtype=release \
            -Dallow-noblas=true

          python numpy/vendored-meson/meson/meson.py compile -C numpy-build
          python numpy/vendored-meson/meson/meson.py install -C numpy-build

          NUMPY_INCLUDE_DIR="$(find numpy-install/iphoneos -type d -path '*/site-packages/numpy/_core/include' -print -quit || true)"
          if [ -z "${NUMPY_INCLUDE_DIR}" ]; then
            NUMPY_INCLUDE_DIR="$(find numpy-install/iphoneos -type d -path '*/site-packages/numpy/core/include' -print -quit || true)"
          fi
          NUMPY_SITE_PACKAGES_DIR="$(find numpy-install/iphoneos -type d -path '*/site-packages' -print -quit || true)"

          if [ -z "${NUMPY_INCLUDE_DIR}" ] || [ -z "${NUMPY_SITE_PACKAGES_DIR}" ]; then
            echo "NumPy iOS headers/site-packages not found" >&2
            exit 1
          fi

          echo "NUMPY_INCLUDE_DIR=$(python -c 'import os,sys; print(os.path.abspath(sys.argv[1]))' "${NUMPY_INCLUDE_DIR}")" >> "${GITHUB_ENV}"
          echo "NUMPY_SITE_PACKAGES_DIR=$(python -c 'import os,sys; print(os.path.abspath(sys.argv[1]))' "${NUMPY_SITE_PACKAGES_DIR}")" >> "${GITHUB_ENV}"

      - name: Build OpenCV Python binding for iOS
        shell: bash
        run: |
          set -euxo pipefail

          PYTHON_BIN="$(python -c 'import sys; print(sys.executable)')"
          PYTHON_INCLUDE_DIR="$(python -c 'import sysconfig; print(sysconfig.get_paths()["include"])')"
          PYTHON_LIB="$(python - <<'PY'
          import os
          import sysconfig
          libdir = sysconfig.get_config_var("LIBDIR") or ""
          ldlib = sysconfig.get_config_var("LDLIBRARY") or ""
          print(os.path.join(libdir, ldlib) if libdir and ldlib else "")
          PY
          )"

          CMAKE_ARGS=(
            -DOPENCV_EXTRA_MODULES_PATH="${PWD}/opencv_contrib/modules"
            -DCMAKE_BUILD_TYPE=Release
            -DCMAKE_INSTALL_PREFIX="${PWD}/install/iphoneos"
            -DCMAKE_SYSTEM_NAME=iOS
            -DAPPLE_FRAMEWORK=OFF
            -DCMAKE_OSX_SYSROOT="${SDK}"
            -DCMAKE_OSX_ARCHITECTURES="${IOS_ARCH}"
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${IOS_DEPLOYMENT_TARGET}"
            -DOPENCV_EXTRA_CXX_FLAGS="-I${PWD}/opencv/3rdparty/dlpack/include"
            -DCMAKE_SHARED_LINKER_FLAGS="-framework Foundation -framework CoreFoundation -framework CoreGraphics -framework QuartzCore -framework UIKit"
            -DCMAKE_MODULE_LINKER_FLAGS="-framework Foundation -framework CoreFoundation -framework CoreGraphics -framework QuartzCore -framework UIKit"
            -DBUILD_SHARED_LIBS=ON
            -DBUILD_LIST=core,imgproc,python3
            -DBUILD_TESTS=OFF
            -DBUILD_PERF_TESTS=OFF
            -DBUILD_EXAMPLES=OFF
            -DBUILD_opencv_apps=OFF
            -DBUILD_opencv_python2=OFF
            -DBUILD_opencv_python3=ON
            -DOPENCV_PYTHON3_INSTALL_PATH="${PWD}/install/iphoneos/python"
            -DPYTHON_DEFAULT_EXECUTABLE="${PYTHON_BIN}"
            -DPython3_EXECUTABLE="${PYTHON_BIN}"
            -DPython3_INCLUDE_DIR="${PYTHON_INCLUDE_DIR}"
            -DPYTHON3_EXECUTABLE="${PYTHON_BIN}"
            -DPYTHON3_INCLUDE_DIR="${PYTHON_INCLUDE_DIR}"
            -DPYTHON3_INCLUDE_PATH="${PYTHON_INCLUDE_DIR}"
            -DPYTHON3_NUMPY_INCLUDE_DIRS="${NUMPY_INCLUDE_DIR}"
            -DPYTHON3_PACKAGES_PATH="${PWD}/install/iphoneos/python"
          )

          if [ -n "${PYTHON_LIB}" ] && [ -f "${PYTHON_LIB}" ]; then
            CMAKE_ARGS+=(-DPYTHON3_LIBRARY="${PYTHON_LIB}")
          fi

          # iOS SDK 里的 Point/Size/Rect/Ptr 与 OpenCV Python 绑定源码同名冲突，做最小限定修正
          python - <<'PY'
          import re
          from pathlib import Path

          def qualify_basic_types(p: Path):
              if not p.exists():
                  return
              s = p.read_text(encoding="utf-8")
              for name in ("Point", "Point2f", "Size", "Rect"):
                  s = re.sub(rf"(?<!:)\b{name}\b", f"cv::{name}", s)
              s = re.sub(r"(?<!:)\bPtr<", "cv::Ptr<", s)
              p.write_text(s, encoding="utf-8")

          for f in (
              "opencv/modules/python/src2/cv2.cpp",
              "opencv/modules/python/src2/cv2_convert.cpp",
              "opencv/modules/core/misc/python/pyopencv_async.hpp",
              "opencv_contrib/modules/rgbd/misc/python/pyopencv_linemod.hpp",
          ):
              qualify_basic_types(Path(f))

          # 清理历史版本可能写入的冲突宏，避免出现 cv::cv::Point
          cv2cpp = Path("opencv/modules/python/src2/cv2.cpp")
          if cv2cpp.exists():
              c = cv2cpp.read_text(encoding="utf-8")
              for bad in (
                  "#define Ptr cv::Ptr\n",
                  "#define Point cv::Point\n",
                  "#define Point2f cv::Point2f\n",
                  "#define Size cv::Size\n",
                  "#define Rect cv::Rect\n",
              ):
                  c = c.replace(bad, "")
              c = c.replace("using namespace cv;\n\n\n", "using namespace cv;\n\n")
              cv2cpp.write_text(c, encoding="utf-8")

          pycompat = Path("opencv/modules/python/src2/pycompat.hpp")
          if pycompat.exists():
              s = pycompat.read_text(encoding="utf-8")
              if "pyopencv_destroy_at(" not in s:
                  s = "template<typename T> static inline void pyopencv_destroy_at(T* p) { p->~T(); }\n" + s
              s = s.replace(
                  "((pyopencv_##CLASS_ID##_t*)self)->v.STORAGE::~SNAME(); \\",
                  "pyopencv_destroy_at(&((pyopencv_##CLASS_ID##_t*)self)->v); \\",
              )
              s = re.sub(r"(?<!:)\bPtr<", "cv::Ptr<", s)
              pycompat.write_text(s, encoding="utf-8")
          PY

          cmake -S opencv -B build-iphoneos -G Ninja "${CMAKE_ARGS[@]}"
          cmake --build build-iphoneos --config Release --target gen_opencv_python_source -j"$(sysctl -n hw.logicalcpu)"

          python - <<'PY'
          import re
          from pathlib import Path
          gen_dir = Path("build-iphoneos/modules/python_bindings_generator")
          for p in gen_dir.glob("pyopencv_generated_*.h"):
              s = p.read_text(encoding="utf-8")
              for t in ("Point", "Point2f", "Size", "Rect"):
                  s = re.sub(rf"(?<!:)\b{t}\b", f"cv::{t}", s)
              s = re.sub(r"(?<!:)\bPtr<", "cv::Ptr<", s)
              p.write_text(s, encoding="utf-8")
          PY

          cmake --build build-iphoneos --config Release -j"$(sysctl -n hw.logicalcpu)"
          cmake --install build-iphoneos --config Release

          CV2_EXT_COUNT="$(find install/iphoneos -type f \( -name 'cv2*.so' -o -name 'cv2*.dylib' \) | wc -l | tr -d ' ')"
          if [ "${CV2_EXT_COUNT}" = "0" ]; then
            echo "ERROR: cv2 extension not found, OpenCV Python binding was not generated." >&2
            exit 1
          fi

      - name: Build wheel and package artifacts
        shell: bash
        run: |
          set -euxo pipefail
          OUT_DIR="artifacts/iphoneos"
          mkdir -p "${OUT_DIR}"

          cp -R "numpy-install/iphoneos" "${OUT_DIR}/numpy"
          cp -R "install/iphoneos" "${OUT_DIR}/opencv-install"

          WHEEL_ROOT="${PWD}/wheel-build"
          PKG_ROOT="${WHEEL_ROOT}/opencv_python_ios"
          rm -rf "${WHEEL_ROOT}"
          mkdir -p "${PKG_ROOT}/cv2/.dylibs"

          CV2_SRC_DIR="$(find install/iphoneos -type d -path '*/cv2' -print -quit || true)"
          CV2_EXT="$(find install/iphoneos -type f \( -name 'cv2*.so' -o -name 'cv2*.dylib' \) -print -quit || true)"

          if [ -z "${CV2_SRC_DIR}" ] && [ -z "${CV2_EXT}" ]; then
            echo "ERROR: no cv2 files found for wheel packaging." >&2
            exit 1
          fi

          if [ -n "${CV2_SRC_DIR}" ] && [ -d "${CV2_SRC_DIR}" ]; then
            cp -R "${CV2_SRC_DIR}/." "${PKG_ROOT}/cv2/"
          fi
          if [ -n "${CV2_EXT}" ]; then
            cp "${CV2_EXT}" "${PKG_ROOT}/cv2/"
          fi
          if [ ! -f "${PKG_ROOT}/cv2/__init__.py" ]; then
            echo "from .cv2 import *" > "${PKG_ROOT}/cv2/__init__.py"
          fi

          find install/iphoneos/lib -maxdepth 1 -type f -name "libopencv*.dylib" -exec cp {} "${PKG_ROOT}/cv2/.dylibs/" \; || true

          cat > "${PKG_ROOT}/setup.py" <<'PY'
          from setuptools import setup, find_packages

          setup(
              name="opencv-python-ios",
              version="4.13.0.0",
              description="OpenCV Python bindings for iOS",
              packages=find_packages(),
              include_package_data=True,
              package_data={"cv2": ["*.so", "*.dylib", ".dylibs/*.dylib"]},
              zip_safe=False,
          )
          PY

          cat > "${PKG_ROOT}/pyproject.toml" <<'TOML'
          [build-system]
          requires = ["setuptools>=68", "wheel"]
          build-backend = "setuptools.build_meta"
          TOML

          (
            cd "${PKG_ROOT}"
            python setup.py bdist_wheel --python-tag cp314 --plat-name ios_13_0_arm64
          )

          WHEEL_FILE="$(ls -1 "${PKG_ROOT}"/dist/*.whl | head -n 1)"
          cp "${WHEEL_FILE}" "opencv-python-ios-iphoneos-py314.whl"
          cp "${WHEEL_FILE}" "${OUT_DIR}/"

          if ! python - <<'PY' "${WHEEL_FILE}"; then
          import sys, zipfile
          z = zipfile.ZipFile(sys.argv[1])
          names = z.namelist()
          ok = any(n.startswith("cv2/") and (n.endswith(".so") or n.endswith(".dylib")) for n in names)
          print("wheel_has_cv2_ext:", ok)
          sys.exit(0 if ok else 1)
          PY
            echo "ERROR: wheel exists but cv2 extension is missing." >&2
            exit 1
          fi

          tar -czf "opencv-python-ios-iphoneos-py314.tar.gz" -C artifacts iphoneos

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-ios-iphoneos-py314
          path: |
            opencv-python-ios-iphoneos-py314.tar.gz
            opencv-python-ios-iphoneos-py314.whl
            artifacts/iphoneos/*.whl
          if-no-files-found: error
