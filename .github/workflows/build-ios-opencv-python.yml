name: build-ios-opencv-python

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/build-ios-opencv-python.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build iOS wheel cp314
    runs-on: macos-14

    env:
      CIBW_PLATFORM: ios
      CIBW_BUILD: cp314-ios_arm64_iphoneos
      CIBW_ARCHS: arm64_iphoneos
      CIBW_BUILD_VERBOSITY: "2"
      IPHONEOS_DEPLOYMENT_TARGET: "13.0"
      NUMPY_GIT_URL: "https://github.com/freakboy3742/numpy.git"
      NUMPY_GIT_REF: "ios-support"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tools
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja pkg-config
          python -m pip install --upgrade pip
          python -m pip install --upgrade "cibuildwheel>=2.20.0" "meson>=1.7.0" "Cython>=3.0.0"

      - name: Build NumPy iOS package (meson cross-build)
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf numpy-builder numpy-build numpy-install
          git clone --depth=1 --branch "${NUMPY_GIT_REF}" --recurse-submodules --shallow-submodules "${NUMPY_GIT_URL}" numpy-builder

          SYSROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
          CC="$(xcrun --sdk iphoneos --find clang)"
          CXX="$(xcrun --sdk iphoneos --find clang++)"
          AR="$(xcrun --sdk iphoneos --find ar)"
          RANLIB="$(xcrun --sdk iphoneos --find ranlib)"
          STRIP="$(xcrun --sdk iphoneos --find strip)"
          TARGET_TRIPLE="arm64-apple-ios13.0"

          cat > numpy-ios.cross <<EOF
          [binaries]
          c = '${CC}'
          cpp = '${CXX}'
          ar = '${AR}'
          ranlib = '${RANLIB}'
          strip = '${STRIP}'
          pkgconfig = 'pkg-config'

          [host_machine]
          system = 'darwin'
          cpu_family = 'aarch64'
          cpu = 'arm64'
          endian = 'little'

          [properties]
          needs_exe_wrapper = true
          longdouble_format = 'IEEE_DOUBLE_LE'

          [built-in options]
          c_args = ['-arch', 'arm64', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          cpp_args = ['-arch', 'arm64', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          c_link_args = ['-arch', 'arm64', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          cpp_link_args = ['-arch', 'arm64', '-isysroot', '${SYSROOT}', '-target', '${TARGET_TRIPLE}']
          EOF

          python numpy-builder/vendored-meson/meson/meson.py setup numpy-build numpy-builder \
            --cross-file "${PWD}/numpy-ios.cross" \
            --prefix "${PWD}/numpy-install/iphoneos" \
            -Dbuildtype=release \
            -Dallow-noblas=true
          python numpy-builder/vendored-meson/meson/meson.py compile -C numpy-build
          python numpy-builder/vendored-meson/meson/meson.py install -C numpy-build

          NUMPY_INCLUDE_DIR="$(find numpy-install/iphoneos -type d -path '*/site-packages/numpy/_core/include' -print -quit || true)"
          if [ -z "${NUMPY_INCLUDE_DIR}" ]; then
            NUMPY_INCLUDE_DIR="$(find numpy-install/iphoneos -type d -path '*/site-packages/numpy/core/include' -print -quit || true)"
          fi
          NUMPY_SITE_PACKAGES_DIR="$(find numpy-install/iphoneos -type d -path '*/site-packages' -print -quit || true)"
          test -n "${NUMPY_INCLUDE_DIR}"
          test -n "${NUMPY_SITE_PACKAGES_DIR}"
          NUMPY_INCLUDE_DIR="$(python -c 'import os,sys; print(os.path.abspath(sys.argv[1]))' "${NUMPY_INCLUDE_DIR}")"
          NUMPY_SITE_PACKAGES_DIR="$(python -c 'import os,sys; print(os.path.abspath(sys.argv[1]))' "${NUMPY_SITE_PACKAGES_DIR}")"
          echo "NUMPY_INCLUDE_DIR=${NUMPY_INCLUDE_DIR}" >> "${GITHUB_ENV}"
          echo "NUMPY_SITE_PACKAGES_DIR=${NUMPY_SITE_PACKAGES_DIR}" >> "${GITHUB_ENV}"

      - name: Clone fixed upstream commit
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf builder
          git clone https://github.com/Py-Swift/opencv-python-old.git builder
          cd builder
          git checkout 0745eb8f88032c65530734db2ef382afa4533a00
          git submodule update --init --recursive

      - name: Patch pyproject build deps for cp314 iOS
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path("builder/pyproject.toml")
          s = p.read_text(encoding="utf-8")
          out = []
          for line in s.splitlines():
            t = line.strip()
            if t.startswith('"numpy<') or t.startswith('"numpy=='):
              continue
            out.append(line)
          p.write_text("\n".join(out) + "\n", encoding="utf-8")
          print("patched", p)
          PY

      - name: Prepare NumPy headers for OpenCV Python wrapper
        shell: bash
        run: |
          set -euxo pipefail
          NUMPY_INCLUDE_DIR="${NUMPY_INCLUDE_DIR:-}"
          if [ -z "${NUMPY_INCLUDE_DIR}" ]; then
            NUMPY_INCLUDE_DIR="$(python - <<'PY'
            import numpy
            print(numpy.get_include())
            PY
            )"
          fi
          test -d "${NUMPY_INCLUDE_DIR}"
          echo "CMAKE_ARGS=-DPYTHON3_NUMPY_INCLUDE_DIRS=${NUMPY_INCLUDE_DIR}" >> "${GITHUB_ENV}"

      - name: Validate NumPy package contains extension modules
        shell: bash
        run: |
          set -euxo pipefail
          NUMPY_ROOT="numpy-install/iphoneos/lib/python3.14/site-packages/numpy"
          test -d "${NUMPY_ROOT}"
          NUMPY_SO_COUNT="$(find "${NUMPY_ROOT}" -type f -name '*.so' | wc -l | tr -d ' ')"
          echo "numpy_so_count=${NUMPY_SO_COUNT}"
          if [ "${NUMPY_SO_COUNT}" = "0" ]; then
            echo "numpy package has no binary extensions"
            exit 1
          fi

          TARGET_BIN="$(find "${NUMPY_ROOT}" -type f -name '_multiarray_umath*.so' | head -n 1 || true)"
          if [ -z "${TARGET_BIN}" ]; then
            echo "missing numpy _multiarray_umath binary"
            exit 1
          fi
          echo "target_numpy_bin=${TARGET_BIN}"
          case "${TARGET_BIN}" in
            *cpython-314-darwin.so|*cpython-314-iphoneos.so) ;;
            *)
              echo "unexpected numpy extension suffix: ${TARGET_BIN}"
              exit 1
              ;;
          esac

          FILE_INFO="$(file "${TARGET_BIN}")"
          echo "${FILE_INFO}"
          if ! echo "${FILE_INFO}" | grep -q "Mach-O 64-bit"; then
            echo "numpy target is not Mach-O 64-bit"
            exit 1
          fi
          if ! echo "${FILE_INFO}" | grep -q "arm64"; then
            echo "numpy target is not arm64"
            exit 1
          fi

          PLATFORM="$(otool -l "${TARGET_BIN}" | awk '/LC_BUILD_VERSION/{flag=1;next} flag && /platform/{print $2; exit}')"
          echo "numpy_build_platform=${PLATFORM}"
          if [ "${PLATFORM}" != "2" ]; then
            echo "expected iOS platform=2, got ${PLATFORM}"
            exit 1
          fi

      - name: Patch setup.py config path for iOS packaging
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path("builder/setup.py")
          s = p.read_text(encoding="utf-8")
          needle = "with open(config_py, 'w') as opencv_init_config:"
          if needle in s and "os.makedirs(os.path.dirname(config_py), exist_ok=True)" not in s:
            s = s.replace(
              needle,
              "os.makedirs(os.path.dirname(config_py), exist_ok=True)\n        " + needle,
              1,
            )
          if "opencv_init_path = os.path.join(cmake_install_dir, 'python', 'cv2', '__init__.py')" not in s:
            s = s.replace(
              "opencv_init_config.write(custom_init_data)",
              "opencv_init_config.write(custom_init_data)\n\n        opencv_init_path = os.path.join(cmake_install_dir, 'python', 'cv2', '__init__.py')\n        os.makedirs(os.path.dirname(opencv_init_path), exist_ok=True)\n        with open(opencv_init_path, 'w') as opencv_init_py:\n            opencv_init_py.write(custom_init_data)",
              1,
            )
          if 'if not found and "gapi" not in relpath_re:' in s:
            s = s.replace(
              'if not found and "gapi" not in relpath_re:',
              'if not found and "gapi" not in relpath_re and not ("ios" in sysconfig.get_platform() and relpath_re.startswith("python/cv2/")):',
              1,
            )
          p.write_text(s, encoding="utf-8")
          print("patched", p)
          PY

      - name: Build iOS wheel via cibuildwheel
        shell: bash
        run: |
          set -euxo pipefail
          cd builder
          python -m cibuildwheel --platform ios --output-dir wheelhouse
          ls -lah wheelhouse

      - name: Validate wheel contains cv2 binary
        shell: bash
        run: |
          set -euxo pipefail
          WHEEL_FILE="$(ls -1 builder/wheelhouse/*.whl | head -n 1)"
          python - <<'PY' "${WHEEL_FILE}"
          import sys
          import zipfile

          wheel = sys.argv[1]
          with zipfile.ZipFile(wheel) as zf:
            names = zf.namelist()

          bins = [n for n in names if n.endswith(".so") or n.endswith(".dylib")]
          print("wheel:", wheel)
          print("binary_count:", len(bins))
          if bins:
            for b in bins[:20]:
              print(" ", b)
          if not bins:
            raise SystemExit("wheel has no compiled cv2 binary")
          PY

      - name: Build Python-Apple-support package (let build_utils process .so)
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          import shutil
          import textwrap
          import zipfile
          from pathlib import Path

          artifacts = Path("artifacts")
          package_root = artifacts / "ios-python-package"
          app_packages = package_root / "app_packages"
          app_packages.mkdir(parents=True, exist_ok=True)

          numpy_pkg = Path("numpy-install/iphoneos/lib/python3.14/site-packages/numpy")
          if not numpy_pkg.is_dir():
            raise SystemExit(f"missing numpy package: {numpy_pkg}")
          shutil.copytree(numpy_pkg, app_packages / "numpy", dirs_exist_ok=True)

          # Normalize NumPy extension suffix to iphoneos so Xcode-side
          # Python extension discovery is consistent with cibuildwheel output.
          renamed = 0
          for so in (app_packages / "numpy").rglob("*cpython-314-darwin.so"):
            dst = so.with_name(so.name.replace("cpython-314-darwin.so", "cpython-314-iphoneos.so"))
            so.rename(dst)
            renamed += 1
          print("numpy_suffix_renamed_to_iphoneos:", renamed)

          wheel_file = next(Path("builder/wheelhouse").glob("*.whl"))
          wheel_unpack_dir = artifacts / "_opencv_wheel_unpack"
          if wheel_unpack_dir.exists():
            shutil.rmtree(wheel_unpack_dir)
          with zipfile.ZipFile(wheel_file) as zf:
            zf.extractall(wheel_unpack_dir)

          cv2_pkg = wheel_unpack_dir / "cv2"
          if not cv2_pkg.is_dir():
            raise SystemExit("cv2 package directory not found in wheel")
          shutil.copytree(cv2_pkg, app_packages / "cv2", dirs_exist_ok=True)

          # Preserve top-level OpenCV runtime/support directories from the wheel.
          # Some builds may emit auxiliary files under opencv_*.libs/.data/.dist-info.
          copied_opencv_roots = []
          for entry in sorted(wheel_unpack_dir.iterdir()):
            name = entry.name
            if not name.startswith("opencv_"):
              continue
            if not (
              name.endswith(".libs")
              or name.endswith(".data")
              or name.endswith(".dist-info")
            ):
              continue
            dst = app_packages / name
            if entry.is_dir():
              shutil.copytree(entry, dst, dirs_exist_ok=True)
            else:
              dst.parent.mkdir(parents=True, exist_ok=True)
              shutil.copy2(entry, dst)
            copied_opencv_roots.append(name)
          print("opencv_extra_roots:", copied_opencv_roots)

          # Some upstream builds emit a broken cv2/__init__.py fragment for iOS
          # (e.g. starts with LOADER_DIR without imports). Replace with a minimal
          # loader that imports the extension binary by explicit path.
          cv2_init = app_packages / "cv2" / "__init__.py"
          if cv2_init.exists():
            current = cv2_init.read_text(encoding="utf-8")
          else:
            current = ""
          if "LOADER_DIR" in current or "PYTHON_EXTENSIONS_PATHS" in current:
            cv2_init.write_text(
              textwrap.dedent(
                """\
                import importlib.machinery as _machinery
                import importlib.util as _util
                import pathlib as _pathlib
                import sys as _sys

                _PKG_DIR = _pathlib.Path(__file__).resolve().parent
                _BIN = None

                # 1) Direct extension binary in app_packages/cv2
                _DIRECT = sorted(
                    p for p in _PKG_DIR.iterdir()
                    if p.is_file() and p.name.startswith("cv2") and p.suffix in (".so", ".dylib")
                )
                if _DIRECT:
                    _BIN = _DIRECT[0]

                # 2) Python-Apple-support .fwork indirection generated by build_utils.sh
                if _BIN is None:
                    _FWORK = sorted(
                        p for p in _PKG_DIR.iterdir()
                        if p.is_file() and p.name.startswith("cv2") and p.suffix == ".fwork"
                    )
                    if _FWORK:
                        _ref = _FWORK[0].read_text(encoding="utf-8").strip()
                        if _ref:
                            _app_root = _PKG_DIR.parent.parent
                            _candidate = (_app_root / _ref).resolve()
                            if _candidate.exists():
                                _BIN = _candidate

                if _BIN is None:
                    raise ImportError("cv2 extension binary not found (.so/.dylib/.fwork)")

                _MOD_NAME = __name__ + ".cv2"
                _LOADER = _machinery.ExtensionFileLoader(_MOD_NAME, str(_BIN))
                _SPEC = _util.spec_from_file_location(_MOD_NAME, str(_BIN), loader=_LOADER)
                if _SPEC is None:
                    raise ImportError(f"failed to create spec for {_BIN}")
                _MOD = _util.module_from_spec(_SPEC)
                _sys.modules[_MOD_NAME] = _MOD
                _LOADER.exec_module(_MOD)

                for _k, _v in _MOD.__dict__.items():
                    if _k.startswith("__") and _k not in {"__doc__", "__all__", "__version__"}:
                        continue
                    globals()[_k] = _v

                cv2 = _MOD
                __all__ = getattr(_MOD, "__all__", [k for k in globals() if not k.startswith("_")])
                """
              ),
              encoding="utf-8",
            )
            print("rewrote broken cv2/__init__.py for ios loader")
          print("package_root:", package_root)
          PY

      - name: Validate Python-Apple-support package layout
        shell: bash
        run: |
          set -euxo pipefail
          python - <<'PY'
          from pathlib import Path

          root = Path("artifacts/ios-python-package")
          app = root / "app_packages"
          numpy_pkg = app / "numpy"
          cv2_pkg = app / "cv2"
          print("numpy_pkg", numpy_pkg.exists(), numpy_pkg)
          print("cv2_pkg", cv2_pkg.exists(), cv2_pkg)
          if not numpy_pkg.exists() or not cv2_pkg.exists():
            raise SystemExit("missing numpy or cv2 package")

          numpy_bins = sorted((app / "numpy").rglob("_multiarray_umath*.so"))
          cv2_bins = sorted((app / "cv2").rglob("cv2*.so")) + sorted((app / "cv2").rglob("cv2*.dylib"))
          cv2_so_bins = sorted((app / "cv2").rglob("cv2*.so"))
          print("numpy_multiarray_so_count:", len(numpy_bins))
          print("cv2_binary_count:", len(cv2_bins))
          print("cv2_so_count:", len(cv2_so_bins))
          if not numpy_bins:
            raise SystemExit("missing numpy _multiarray_umath .so")
          if not cv2_bins:
            raise SystemExit("missing cv2 binary (.so/.dylib)")
          if not cv2_so_bins:
            raise SystemExit("missing cv2 .so; build_utils.sh only processes .so extension modules")

          bad_numpy = sorted((app / "numpy").rglob("*cpython-314-darwin.so"))
          print("numpy_darwin_suffix_count:", len(bad_numpy))
          if bad_numpy:
            raise SystemExit("numpy still contains darwin suffix .so files")

          cv2_init = app / "cv2" / "__init__.py"
          if not cv2_init.exists():
            raise SystemExit("missing cv2/__init__.py")
          txt = cv2_init.read_text(encoding="utf-8")
          if "LOADER_DIR" in txt:
            raise SystemExit("broken cv2/__init__.py contains unresolved LOADER_DIR")
          if "ExtensionFileLoader" not in txt:
            raise SystemExit("cv2/__init__.py does not contain binary loader code")

          bins = sorted(app.rglob("*.so")) + sorted(app.rglob("*.dylib"))
          print("binary_count:", len(bins))
          if not bins:
            raise SystemExit("no binaries (.so/.dylib) found in app_packages")

          opencv_lib_dirs = sorted(
            p.name for p in app.iterdir()
            if p.is_dir() and p.name.startswith("opencv_") and p.name.endswith(".libs")
          )
          print("opencv_lib_dirs:", opencv_lib_dirs)
          PY

      - name: Validate packaged binary runtime compatibility
        shell: bash
        run: |
          set -euxo pipefail
          APP_ROOT="artifacts/ios-python-package/app_packages"

          NUMPY_LINALG_BIN="$(find "${APP_ROOT}/numpy/linalg" -type f \( -name '_umath_linalg*.so' -o -name '_umath_linalg*.dylib' \) | head -n 1 || true)"
          CV2_BIN="$(find "${APP_ROOT}/cv2" -type f -name 'cv2*.so' | head -n 1 || true)"

          test -n "${NUMPY_LINALG_BIN}"
          test -n "${CV2_BIN}"
          echo "numpy_linalg_bin=${NUMPY_LINALG_BIN}"
          echo "cv2_bin=${CV2_BIN}"

          for BIN in "${NUMPY_LINALG_BIN}" "${CV2_BIN}"; do
            INFO="$(file "${BIN}")"
            echo "${INFO}"
            echo "${INFO}" | grep -q "Mach-O 64-bit"
            echo "${INFO}" | grep -q "arm64"
            PLATFORM="$(otool -l "${BIN}" | awk '/LC_BUILD_VERSION/{flag=1;next} flag && /platform/{print $2; exit}')"
            echo "platform(${BIN})=${PLATFORM}"
            test "${PLATFORM}" = "2"
          done

          # Log linalg link dependencies for diagnostics; don't hard-fail on
          # a specific BLAS backend as this can vary by build configuration.
          echo "numpy_linalg_deps:"
          otool -L "${NUMPY_LINALG_BIN}"

          # Python-Apple-support build_utils.sh converts .so to frameworks.
          # Reject cv2 linkage against wheel-side opencv_*.libs payloads, because
          # those dylibs are not transformed by build_utils.sh.
          CV2_DEPS="$(otool -L "${CV2_BIN}" | tail -n +2 | awk '{print $1}')"
          echo "cv2_deps:"
          echo "${CV2_DEPS}"
          while IFS= read -r DEP; do
            [[ -z "${DEP}" ]] && continue
            case "${DEP}" in
              /System/*|/usr/lib/*|@rpath/Python.framework/*|@rpath/libpython*|@loader_path/*|@rpath/*.framework/*)
                ;;
              *)
                echo "Unsupported cv2 dependency for iOS app embedding: ${DEP}"
                exit 1
                ;;
            esac
            if [[ "${DEP}" == *"opencv_"*".libs"* ]]; then
              echo "cv2 depends on opencv_*.libs payload, which is incompatible with build_utils.sh: ${DEP}"
              exit 1
            fi
          done <<< "${CV2_DEPS}"

      - name: Collect artifacts
        shell: bash
        run: |
          set -euxo pipefail
          cp builder/wheelhouse/*.whl opencv-python-ios-cp314-arm64-iphoneos.whl
          mkdir -p artifacts
          cp -R builder/wheelhouse artifacts/
          cp -R numpy-install/iphoneos artifacts/numpy-install-iphoneos

          tar -czf opencv-python-ios-cp314-arm64-iphoneos.tar.gz -C artifacts wheelhouse
          tar -czf numpy-ios-arm64-iphoneos-install.tar.gz -C artifacts numpy-install-iphoneos
          tar -czf ios-python-package-cp314-arm64-iphoneos.tar.gz -C artifacts ios-python-package

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencv-python-ios-cp314-arm64-iphoneos
          path: |
            opencv-python-ios-cp314-arm64-iphoneos.whl
            opencv-python-ios-cp314-arm64-iphoneos.tar.gz
            numpy-ios-arm64-iphoneos-install.tar.gz
            ios-python-package-cp314-arm64-iphoneos.tar.gz
            artifacts/wheelhouse/*.whl
            artifacts/numpy-install-iphoneos/**
            artifacts/ios-python-package/**
          if-no-files-found: error
